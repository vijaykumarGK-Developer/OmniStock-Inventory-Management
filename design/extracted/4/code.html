<style>
        /* Custom Material Symbol styling for weights */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: theme('colors.surface-container-low'); 
        }
        ::-webkit-scrollbar-thumb {
            background: theme('colors.outline-variant'); 
            border-radius: theme('borderRadius.full');
        }
        ::-webkit-scrollbar-thumb:hover {
            background: theme('colors.outline'); 
        }
        
        /* Glassmorphism custom utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }
        select.glass-input option {
            background-color: #1e1b4b; /* dark indigo for options */
            color: white;
        }

<body class="bg-surface-container-low min-h-screen w-full flex items-center justify-center relative overflow-hidden font-body-md text-white antialiased selection:bg-indigo-500/50 selection:text-white">
<!-- Vibrant Abstract Gradient Background -->
<div class="absolute inset-0 z-0 bg-gradient-to-br from-indigo-700 via-violet-600 to-teal-500">
<!-- Decorative glowing orbs -->
<div class="absolute top-[10%] left-[15%] w-[40vw] h-[40vw] bg-purple-500/40 rounded-full mix-blend-screen filter blur-[100px] opacity-70"></div>
<div class="absolute bottom-[5%] right-[10%] w-[35vw] h-[35vw] bg-teal-400/40 rounded-full mix-blend-screen filter blur-[120px] opacity-60"></div>
<div class="absolute top-[40%] right-[40%] w-[30vw] h-[30vw] bg-indigo-400/30 rounded-full mix-blend-screen filter blur-[90px] opacity-80"></div>
</div>
<!-- Login Card Container -->
<div class="relative z-10 w-full max-w-[420px] mx-container-padding glass-panel rounded-2xl shadow-[0_24px_64px_-12px_rgba(0,0,0,0.3)] p-8 flex flex-col">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-14 h-14 bg-white/10 rounded-xl flex items-center justify-center mb-4 shadow-lg border border-white/20 backdrop-blur-md">
<span class="material-symbols-outlined text-white text-[32px]" data-weight="fill">inventory_2</span>
</div>
<h1 class="font-display-lg text-4xl font-bold text-white tracking-tight drop-shadow-sm">StockPro</h1>
<p class="font-label-uppercase text-label-uppercase text-white/70 tracking-widest mt-2 uppercase">Enterprise Logistics</p>
</div>
<h2 class="font-headline-md text-headline-md text-white text-center mb-6 drop-shadow-sm">Sign In</h2>
<!-- Login Form -->
<form class="flex flex-col gap-stack-loose" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-stack-compact">
<label class="font-label-uppercase text-label-uppercase text-white/80" for="email">Corporate Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/50 text-[18px]">mail</span>
</div>
<input class="w-full glass-input rounded-xl py-3 pl-10 pr-4 font-body-md text-body-md text-white placeholder:text-white/40 focus:ring-1 focus:ring-white/40 focus:outline-none transition-all duration-300" id="email" name="email" placeholder="manager@stockpro.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-compact">
<div class="flex justify-between items-baseline">
<label class="font-label-uppercase text-label-uppercase text-white/80" for="password">Password</label>
<a class="font-body-sm text-body-sm text-teal-300 hover:text-white transition-colors hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/50 text-[18px]">lock</span>
</div>
<input class="w-full glass-input rounded-xl py-3 pl-10 pr-10 font-body-md text-body-md text-white placeholder:text-white/40 focus:ring-1 focus:ring-white/40 focus:outline-none transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-white/50 hover:text-white transition-colors cursor-pointer" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-[18px]" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Role Selector -->
<div class="flex flex-col gap-stack-compact">
<label class="font-label-uppercase text-label-uppercase text-white/80" for="role">System Role</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/50 text-[18px]">badge</span>
</div>
<select class="w-full glass-input rounded-xl py-3 pl-10 pr-10 font-body-md text-body-md text-white appearance-none focus:ring-1 focus:ring-white/40 focus:outline-none transition-all duration-300 cursor-pointer" id="role" name="role" required="">
<option disabled="" hidden="" selected="" value="">Select access level</option>
<option value="admin">Administrator</option>
<option value="manager">Operations Manager</option>
<option value="staff">Warehouse Staff</option>
</select>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/50 text-[18px]">expand_more</span>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-2">
<input class="h-4 w-4 text-teal-400 bg-white/10 border-white/30 rounded focus:ring-teal-400 focus:ring-offset-0 focus:outline-none transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-white/80 cursor-pointer" for="remember-me">
                    Remember my credentials
                </label>
</div>
<!-- Submit Action -->
<button class="w-full bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-400 hover:to-violet-500 text-white font-label-uppercase text-label-uppercase font-bold py-3.5 px-4 rounded-xl shadow-[0_8px_20px_-6px_rgba(99,102,241,0.5)] hover:shadow-[0_12px_24px_-6px_rgba(99,102,241,0.7)] transition-all duration-300 mt-4 flex items-center justify-center gap-2 transform hover:-translate-y-0.5 border border-white/10" type="submit">
                Secure Login
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-8 pt-6 border-t border-white/10 text-center">
<p class="font-body-sm text-body-sm text-white/50 flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">encrypted</span>
                End-to-end encrypted connection
            </p>
</div>
</div>
<!-- Micro-interaction script -->
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
